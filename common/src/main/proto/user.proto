syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.kindness.common.grpc.user";

service UserService {
  rpc GetAllUsers(AllUsersDataRequest) returns (AllUsersDataResponse);
  rpc GetUserData(UserDataRequest) returns (UserDataResponse);
  rpc Login(ValidateLoginRequest) returns (LoginValidationResponse);
}

message UserDataRequest {
  int64 user_id = 1;
}

message AllUsersDataRequest {}

message UserDataResponse {
  int64 user_id = 1;
  string first_name = 2;
  string second_name = 3;
  string email = 4;
  string role = 5;
}

message AllUsersDataResponse {
  repeated UserDataResponse data = 1;
}

message ValidateLoginRequest{
  string email = 1;
  string password = 2;
}

message LoginValidationResponse{
  bool success = 1;
  string message = 2;
  int64 user_id = 3;
}
