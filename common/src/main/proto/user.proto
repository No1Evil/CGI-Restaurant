syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.kindness.common.grpc.user";

service UserService {
  rpc GetUser(UserRequest) returns (UserResponse);
  rpc GetUserCollection(UserCollectionRequest) returns (UserCollectionResponse);
}

/*
Requests
 */

message UserRequest {
  int64 user_id = 1;
}

message UserCollectionRequest {}

/*
Data
 */

message UserData{
  int64 user_id = 3;
  string first_name = 4;
  string second_name = 5;
  string email = 6;
  string role = 7;
}

/*
Responses
 */

message UserResponse{
  bool success = 1;
  string message = 2;
  UserData data = 3;
}

message UserCollectionResponse {
  bool success = 1;
  string message = 2;
  repeated UserData data = 3;
}
