syntax = "proto3";

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "org.kindness.common.grpc.restaraunt";

service RestaurantService {
  rpc GetRestaurant(RestaurantRequest) returns (RestaurantResponse);
  rpc GetRestaurantCollection(RestaurantCollectionRequest) returns (RestaurantCollectionResponse);
}

/*
Requests
 */
message RestaurantRequest {
  int64 restaurant_id = 1;
}

message RestaurantCollectionRequest{}

/*
Data
 */

message RestaurantData {
  int64 restaurant_id = 1;
  string name = 2;
  string address = 3;
  string phone = 4;
  string email = 5;

  google.protobuf.Timestamp open_time = 6;
  google.protobuf.Timestamp close_time = 7;
}

/*
Responses
 */

message RestaurantResponse {
  bool success = 1;
  string message = 2;
  RestaurantData data = 3;
}

message RestaurantCollectionResponse {
  bool success = 1;
  string message = 2;
  repeated RestaurantData data = 3;
}