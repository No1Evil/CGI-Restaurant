syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.kindness.common.grpc.zone";

service ZoneService {
  rpc getZoneData(ZoneDataRequest) returns (ZoneDataResponse);
  rpc getAllZonesData(AllZonesDataRequest) returns (AllZonesDataResponse);
}

message ZoneDataRequest{
  int64 zone_id = 1;
}

message ZoneDataResponse{
  bool success = 1;
  string message = 2;
  string name = 3;
}

message AllZonesDataRequest{}

message AllZonesDataResponse{
  bool success = 1;
  string message = 2;
  repeated ZoneDataResponse data = 3;
}