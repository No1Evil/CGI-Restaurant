syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.kindness.common.grpc.zone";

service ZoneService {
  rpc getZone(ZoneRequest) returns (ZoneResponse);
  rpc getZoneCollection(ZoneCollectionRequest) returns (ZoneCollectionResponse);
}

/*
Requests
 */

message ZoneRequest{
  int64 zone_id = 1;
}

message ZoneCollectionRequest{}

/*
Data
 */

message ZoneData {
  int64 zone_id = 1;
  string name = 2;
}

/*
Responses
 */

message ZoneResponse{
  bool success = 1;
  string message = 2;
  ZoneData data = 3;
}

message ZoneCollectionResponse{
  bool success = 1;
  string message = 2;
  repeated ZoneData data = 3;
}